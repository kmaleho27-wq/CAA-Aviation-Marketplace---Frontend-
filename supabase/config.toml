# Naluka — Supabase project config
# See https://supabase.com/docs/guides/cli/config

project_id = "naluka"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.vault]
public = false
file_size_limit = "50MiB"
allowed_mime_types = ["application/pdf", "image/png", "image/jpeg"]

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # demo: skip email confirmation; flip to true for prod

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.payfast-create-payment]
verify_jwt = true  # called by SPA users to start a transaction

[functions.payfast-itn]
verify_jwt = false  # PayFast doesn't send a JWT; we verify signature + IP + postback

[functions.sacaa-verify]
verify_jwt = true

[functions.sacaa-sweep]
verify_jwt = false  # called by pg_cron with x-cron-secret

[functions.expiry-sweep]
verify_jwt = false  # called by pg_cron with x-cron-secret

[functions.send-welcome-email]
verify_jwt = false  # called by approve_personnel RPC via pg_net with x-cron-secret

# Stripe scaffolding (stripe-webhook, payments-create-intent,
# stripe-onboard-return) was deleted in commit "cleanup Stripe
# scaffolding" — Naluka's payment provider is PayFast for ZAR. If we
# add Stripe for international currencies in Tier 2, recreate the
# Edge Functions then.
